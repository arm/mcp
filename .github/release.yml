# Configures GitHub's auto-generated release notes (used by `gh release create
# --generate-notes` and the "Create Release" workflow). PRs are grouped into
# the categories below based on their labels.
changelog:
  exclude:
    labels:
      - ignore-for-release
      - skip-changelog
    authors:
      - dependabot
      - github-actions
  categories:
    - title: Breaking Changes 🛠
      labels:
        - breaking-change
        - breaking
    - title: New Features 🚀
      labels:
        - feature
        - enhancement
    - title: Bug Fixes 🐛
      labels:
        - bug
        - fix
    - title: Documentation 📝
      labels:
        - documentation
        - docs
    - title: Maintenance 🧰
      labels:
        - chore
        - refactor
        - ci
        - dependencies
    - title: Other Changes
      labels:
        - "*"
