# Configures GitHub's auto-generated release notes (used by `gh release create
# --generate-notes` and the "Create Release" workflow). PRs are grouped into
# the categories below based on their labels.
changelog:
  exclude:
    labels:
      - ignore-for-release
      - skip-changelog
    authors:
      # Bot accounts author PRs/commits under their "[bot]" login (e.g.
      # dependabot[bot], github-actions[bot]). The bare names without the
      # "[bot]" suffix won't match, so exclude both forms to be safe.
      - dependabot
      - dependabot[bot]
      - github-actions
      - github-actions[bot]
  categories:
    - title: Breaking Changes 🛠
      labels:
        - breaking-change
        - breaking
    - title: New Features 🚀
      labels:
        - feature
        - enhancement
    - title: Bug Fixes 🐛
      labels:
        - bug
        - fix
    - title: Documentation 📝
      labels:
        - documentation
        - docs
    - title: Maintenance 🧰
      labels:
        - chore
        - refactor
        - ci
        - dependencies
    - title: Other Changes
      labels:
        - "*"
