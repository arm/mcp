name: Build MCP Image

on:
  workflow_run:
    workflows: ["Build Embeddings Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Manual version bump: major (X.0.0) or hotfix (x.y.Z). Minor (x.Y.0) is automatic on knowledge-base rebuilds."
        type: choice
        options:
          - major
          - hotfix
        default: major
      dry_run:
        description: "Build without pushing images, manifests, or git tags"
        type: boolean
        default: false

# Shared expressions, exported to every run step and usable in step if:/with:
# (env context). NOTE: `concurrency` below can't read env (github/inputs/vars
# only), so that one main+dry check stays inline.
env:
  IMAGE: armlimited/arm-mcp
  IS_MAIN: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main') || (github.event_name != 'workflow_run' && github.ref == 'refs/heads/main') }}
  IS_DRY_RUN: ${{ github.event.inputs.dry_run == true || github.event.inputs.dry_run == 'true' }}

# Serialize only publishing runs so overlapping builds can't race on
# computing/publishing the same auto-incremented version (alias + git tag).
# Publishing runs (from main, not dry_run) share a single static group so they
# queue behind one another. Non-publishing runs (dry_run or non-main) never
# touch shared version/tag state, so they get a unique per-run group and run
# concurrently without blocking the publishing queue.
concurrency:
  group: >-
    ${{
      (
        ((github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main') || (github.event_name != 'workflow_run' && github.ref == 'refs/heads/main'))
        && !(github.event.inputs.dry_run == true || github.event.inputs.dry_run == 'true')
      )
      && 'build-mcp-image-publish'
      || format('build-mcp-image-{0}', github.run_id)
    }}
  cancel-in-progress: false

jobs:
  build-arch-images:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            tag: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            tag: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    outputs:
      build_date: ${{ steps.build_date.outputs.build_date }}
      date_tag: ${{ steps.build_date.outputs.date_tag }}
    steps:
      - name: Guard against non-main publishing
        run: |
          # workflow_dispatch can be started from any branch (GitHub has no
          # branch filter for it). Publishing is main-only; non-main runs are
          # allowed solely as dry_run validation, else fail fast.
          if [ "${IS_MAIN}" != "true" ] && [ "${IS_DRY_RUN}" != "true" ]; then
            echo "::error::Non-main runs must set dry_run=true (build/validate only, never publish)."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Build the exact upstream commit (head_sha) for workflow_run so
          # images, manifests, and git tags all reference the same commit.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set build date and unique date tag (UTC)
        id: build_date
        run: |
          if [ -n "${{ github.event.workflow_run.created_at }}" ]; then
            BUILD_DATE=$(date -u -d "${{ github.event.workflow_run.created_at }}" +%Y-%m-%d)
          else
            BUILD_DATE=$(date -u +%Y-%m-%d)
          fi
          # Append run_number so every run gets a distinct date tag. Without it,
          # two runs on the same day would share one tag, and the later run would
          # alias its version/git tag onto the earlier run's image digest.
          DATE_TAG="${BUILD_DATE}-${{ github.run_number }}"
          echo "BUILD_DATE=$BUILD_DATE" >> "$GITHUB_ENV"
          echo "DATE_TAG=$DATE_TAG" >> "$GITHUB_ENV"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"
          echo "date_tag=$DATE_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Only publishing runs push, so only they log in. Non-dry implies main
        # (the top-level guard rejects non-main non-dry runs).
        if: ${{ env.IS_DRY_RUN != 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.platform }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: mcp-local/Dockerfile
          platforms: ${{ matrix.platform }}
          # Push only on publishing runs (non-dry implies main per the guard).
          push: ${{ env.IS_DRY_RUN != 'true' }}
          tags: ${{ env.IMAGE }}:${{ env.DATE_TAG }}-${{ matrix.tag }}
          build-args: |
            EMBEDDINGS_IMAGE=${{ env.IMAGE }}:embeddings-latest

  merge-manifests:
    needs: build-arch-images
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    if: ${{ needs.build-arch-images.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For workflow_run triggers, check out the exact commit the upstream
          # build ran on (head_sha) so created git tags point at the build input
          # commit, not whatever later landed on the default branch. Falls back
          # to the default ref for other triggers (e.g. workflow_dispatch).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Only publishing runs write to the registry (non-dry implies main).
        if: ${{ env.IS_DRY_RUN != 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-arch manifest for date tag
        env:
          DATE_TAG: ${{ needs.build-arch-images.outputs.date_tag }}
        run: |
          # date_tag is unique per run (includes run_number), so this manifest
          # always describes the images this run just built.
          if [ "${IS_DRY_RUN}" = "true" ]; then
            echo "[dry-run] Would create ${IMAGE}:${DATE_TAG} from ${DATE_TAG}-amd64/-arm64"
            exit 0
          fi
          docker buildx imagetools create \
            -t "${IMAGE}:${DATE_TAG}" \
            "${IMAGE}:${DATE_TAG}-amd64" \
            "${IMAGE}:${DATE_TAG}-arm64"

      - name: Determine version tag
        id: version
        # Read-only (computes a version, writes nothing); previews on dry runs
        # too. Publishing is enforced by the top-level guard.
        env:
          # minor is automatic for KB rebuilds; manual runs pick major/hotfix.
          BUMP_TYPE: ${{ github.event_name == 'workflow_run' && 'minor' || github.event.inputs.bump_type }}
        run: |
          # Git tags are the source of truth: pick the highest vX.Y.Z tag (sort
          # -V orders versions correctly) and bump it
          # (minor x.Y+1.0 | major X+1.0.0 | hotfix x.y.Z+1).
          git fetch --tags --force --quiet
          latest="$(git tag -l | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)"
          if [ -z "${latest}" ]; then
            echo "::error::No vX.Y.Z git tags found; refusing to bump from 0.0.0."
            exit 1
          fi
          ver="${latest#v}"
          major="${ver%%.*}"; rest="${ver#*.}"; minor="${rest%%.*}"; patch="${rest##*.}"
          case "${BUMP_TYPE:-minor}" in
            major)  TAG_VERSION="$((major + 1)).0.0" ;;
            minor)  TAG_VERSION="${major}.$((minor + 1)).0" ;;
            hotfix) TAG_VERSION="${major}.${minor}.$((patch + 1))" ;;
            *) echo "::error::Unknown bump_type '${BUMP_TYPE}'."; exit 1 ;;
          esac
          echo "Highest ${latest} -> next (${BUMP_TYPE}): ${TAG_VERSION}"
          echo "tag_version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Add latest and version aliases to date tag
        env:
          DATE_TAG: ${{ needs.build-arch-images.outputs.date_tag }}
          TAG_VERSION: ${{ steps.version.outputs.tag_version }}
        run: |
          # Alias this run's unique date tag as latest and the version tag
          # (imagetools create copies the manifest by digest).
          if [ "${IS_DRY_RUN}" = "true" ]; then
            echo "[dry-run] Would alias ${IMAGE}:${DATE_TAG} as latest and ${TAG_VERSION}"
            exit 0
          fi
          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${TAG_VERSION}" \
            "${IMAGE}:${DATE_TAG}"
          echo "Aliased ${DATE_TAG} as latest and ${TAG_VERSION}."

      - name: Create and push matching git tag
        id: gittag
        env:
          TAG_VERSION: ${{ steps.version.outputs.tag_version }}
        run: |
          GIT_TAG="v${TAG_VERSION}"
          echo "git_tag=${GIT_TAG}" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          HEAD_SHA="$(git rev-parse HEAD)"
          if git rev-parse -q --verify "refs/tags/${GIT_TAG}" >/dev/null; then
            # Existing tag must point at the built commit (^{commit} derefs
            # annotated tags), else aliases/release would describe another commit.
            EXISTING_SHA="$(git rev-parse -q --verify "refs/tags/${GIT_TAG}^{commit}")"
            if [ "${EXISTING_SHA}" != "${HEAD_SHA}" ]; then
              echo "::error::${GIT_TAG} exists at ${EXISTING_SHA}, not the built commit ${HEAD_SHA}."
              exit 1
            fi
            echo "${GIT_TAG} already exists and matches HEAD; skipping creation."
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          elif [ "${IS_DRY_RUN}" = "true" ]; then
            echo "[dry-run] Would create and push ${GIT_TAG}."
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          else
            git tag -a "${GIT_TAG}" -m "Release ${GIT_TAG} (matches ${IMAGE}:${TAG_VERSION})"
            git push origin "refs/tags/${GIT_TAG}"
            echo "Created and pushed ${GIT_TAG}."
            echo "created=true" >> "$GITHUB_OUTPUT"
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release with changelog
        # Runs whenever the tag exists (idempotent backfill if a prior run pushed
        # the tag but didn't create the release); skips if a release exists.
        # tag_exists is false on dry runs.
        if: ${{ steps.gittag.outputs.tag_exists == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_TAG: ${{ steps.gittag.outputs.git_tag }}
          TAG_VERSION: ${{ steps.version.outputs.tag_version }}
          BUILD_DATE: ${{ needs.build-arch-images.outputs.build_date }}
        run: |
          if gh release view "${GIT_TAG}" >/dev/null 2>&1; then
            echo "Release ${GIT_TAG} already exists; nothing to do."
            exit 0
          fi
          # --generate-notes and --notes are mutually exclusive, so generate the
          # changelog first, then prepend the image header via edit.
          gh release create "${GIT_TAG}" --title "${GIT_TAG}" --generate-notes
          NOTES="$(gh release view "${GIT_TAG}" --json body --jq '.body')"
          printf 'Docker image: `%s:%s` (built %s)\n\n%s\n' "${IMAGE}" "${TAG_VERSION}" "${BUILD_DATE}" "${NOTES}" > release_notes.md
          gh release edit "${GIT_TAG}" --notes-file release_notes.md
          rm -f release_notes.md
          echo "Created GitHub Release ${GIT_TAG}."

      - name: Update server.json version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_VERSION: ${{ steps.version.outputs.tag_version }}
        run: |
          # Bump version + OCI identifier in server.json and open a PR to main.
          # PR-based (branch-protection friendly); always rebased onto fresh
          # origin/main with push retries to tolerate concurrent updates.
          SERVER_JSON="mcp-local/server.json"
          BUMP_BRANCH="chore/bump-server-json-${TAG_VERSION}"
          if [ "${IS_DRY_RUN}" = "true" ]; then
            echo "[dry-run] Would bump ${SERVER_JSON} to ${TAG_VERSION} and open a PR to main."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          apply_bump() {
            git fetch origin main
            git checkout -B "${BUMP_BRANCH}" origin/main
            tmp="$(mktemp)"
            # Fail fast on jq error/empty output so we never write an empty file.
            if ! jq --arg v "${TAG_VERSION}" '
              .version = $v
              | .packages |= map(
                  if (.identifier // "") | startswith("docker.io/armlimited/arm-mcp:")
                  then .identifier = "docker.io/armlimited/arm-mcp:\($v)"
                  else . end
                )
            ' "${SERVER_JSON}" > "${tmp}"; then
              echo "::error::jq failed to update ${SERVER_JSON}."; rm -f "${tmp}"; return 1
            fi
            if [ ! -s "${tmp}" ]; then
              echo "::error::jq produced empty output for ${SERVER_JSON}."; rm -f "${tmp}"; return 1
            fi
            mv "${tmp}" "${SERVER_JSON}"
          }

          apply_bump || exit 1
          if git diff --quiet -- "${SERVER_JSON}"; then
            echo "${SERVER_JSON} already at ${TAG_VERSION}; nothing to do."
            exit 0
          fi
          git add "${SERVER_JSON}"
          git commit -m "chore: bump server.json to ${TAG_VERSION}"

          pushed=false
          for attempt in 1 2 3; do
            if git push --force-with-lease origin "${BUMP_BRANCH}"; then pushed=true; break; fi
            echo "Push ${attempt} failed; rebasing onto origin/main and retrying..."
            apply_bump || exit 1
            # If the bump already landed concurrently, stop cleanly (an identical
            # branch would make `gh pr create` fail with no commits).
            if git diff --quiet -- "${SERVER_JSON}"; then
              echo "${SERVER_JSON} already at ${TAG_VERSION} on origin/main; nothing to push."
              exit 0
            fi
            git add "${SERVER_JSON}"
            git commit -m "chore: bump server.json to ${TAG_VERSION}"
          done
          [ "${pushed}" = "true" ] || { echo "::error::Failed to push ${BUMP_BRANCH}."; exit 1; }

          if gh pr view "${BUMP_BRANCH}" >/dev/null 2>&1; then
            echo "PR for ${BUMP_BRANCH} already exists; branch updated."
          else
            # Requires "Allow GitHub Actions to create and approve pull requests"
            # (or a PAT/App token with pull-requests: write).
            gh pr create \
              --base main --head "${BUMP_BRANCH}" \
              --title "chore: bump server.json to ${TAG_VERSION}" \
              --body "Automated bump of \`${SERVER_JSON}\` to \`${TAG_VERSION}\` (matches \`armlimited/arm-mcp:${TAG_VERSION}\`)."
            echo "Opened PR to bump ${SERVER_JSON} to ${TAG_VERSION}."
          fi
